media:
  input: images
  output: /images

content:
   - name: homepage
    label: Homepage
    type: file
    path: content/homepage.json
    format: json
    fields:
      - name: heroTitle
        label: Hero Title
        type: string

      - name: heroSubtitle
        label: Hero Subtitle
        type: text

      - name: missionTitle
        label: Mission Title
        type: string

      - name: missionText
        label: Mission Text
        type: text

      - name: featuredEventTitle
        label: Featured Event Title
        type: string

      - name: featuredEventText
        label: Featured Event Text
        type: text

      - name: galleryPreviewTitle
        label: Gallery Preview Title
        type: string
      - name: aboutTitle
        label: About Title
        type: string

      - name: aboutParagraph1
        label: About Paragraph 1
        type: text

      - name: aboutParagraph2
        label: About Paragraph 2
        type: text

      - name: aboutParagraph3
        label: About Paragraph 3
        type: text

      - name: connectTitle
        label: Connect Title
        type: string

      - name: connectParagraph1
        label: Connect Paragraph 1
        type: text

      - name: connectParagraph2
        label: Connect Paragraph 2
        type: text

      - name: upcomingTitle
        label: Upcoming Events Title
        type: string

      - name: galleryTitle
        label: Gallery Title
        type: string

  - name: about
    label: About
    type: file
    path: content/about.json
    format: json
    fields:
      - name: title
        label: Title
        type: string

      - name: paragraph1
        label: Paragraph 1
        type: text

      - name: paragraph2
        label: Paragraph 2
        type: text

      - name: paragraph3
        label: Paragraph 3
        type: text