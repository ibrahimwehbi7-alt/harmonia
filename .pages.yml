media:
  input: images
  output: /images

content:
  - name: site
    label: Website Content
    type: file
    path: content/site.json
    format: json
    fields:
      - name: aboutTitle
        label: About Title
        type: string

      - name: aboutParagraph1
        label: About Paragraph 1
        type: text

      - name: aboutParagraph2
        label: About Paragraph 2
        type: text

      - name: aboutParagraph3
        label: About Paragraph 3
        type: text

      - name: connectTitle
        label: Connect Title
        type: string

      - name: connectParagraph1
        label: Connect Paragraph 1
        type: text

      - name: connectParagraph2
        label: Connect Paragraph 2
        type: text

      - name: upcomingTitle
        label: Upcoming Events Title
        type: string

      - name: galleryTitle
        label: Gallery Title
        type: string